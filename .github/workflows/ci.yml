name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Everything here is stdlib-only — no pip install. server_http_sdk.py is the
      # one file that imports a non-stdlib package (`mcp`), so it is compiled/tested
      # only under its venv (venv-mcp), never in CI.
      - name: Compile (py_compile, stdlib files only)
        run: |
          python3 -m py_compile hooks/*.py skills/second-brain/scripts/*.py
          for f in mcp/*.py; do
            [ "$f" = "mcp/server_http_sdk.py" ] && continue
            python3 -m py_compile "$f"
          done

      - name: Hook tests
        run: |
          for t in hooks/test_*.py; do
            echo "== $t =="
            python3 "$t"
          done

      - name: MCP test
        run: python3 mcp/test_mcp.py

      - name: dedup self-test
        run: python3 skills/second-brain/scripts/dedup.py --selftest

      - name: Exercise scripts against a fixture vault
        run: |
          set -e
          export CLAUDE_MEMORY_DIR="$RUNNER_TEMP/fixture-vault"
          mkdir -p "$CLAUDE_MEMORY_DIR/proj"
          cat > "$CLAUDE_MEMORY_DIR/proj/note-a.md" <<'EOF'
          ---
          name: note-a
          title: Note A
          description: first fixture note
          tags: [tooling, project/proj, type/context]
          asserted: 2020-01-01
          last_confirmed: 2020-01-01
          source: user
          confidence: high
          status: active
          ---
          # Note A
          🟢 **active**
          Links to [[note-b]].
          EOF
          cat > "$CLAUDE_MEMORY_DIR/proj/note-b.md" <<'EOF'
          ---
          name: note-b
          title: Note B
          description: second fixture note
          tags: [tooling, project/proj, type/context]
          asserted: 2020-02-01
          last_confirmed: 2020-02-01
          source: user
          confidence: high
          status: active
          ---
          # Note B
          🟢 **active**
          Back to [[note-a]].
          EOF
          S=skills/second-brain/scripts
          python3 $S/export.py
          python3 $S/graph.py
          python3 $S/stale.py
          python3 $S/health.py
          python3 $S/pull.py note
          python3 $S/find.py note
